<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Monolith | Create Account</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<!-- shared config -->
<script src="../assets/shared/tailwind.js"></script>

<!-- global css -->
<link rel="stylesheet" href="../assets/css/global.css">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex items-center justify-center p-4 selection:bg-primary/20 selection:text-primary">
<main class="w-full max-w-md">
<div class="text-center mb-10">
<h1 class="font-headline font-extrabold text-3xl text-primary tracking-tighter mb-2">Monolith</h1>
<p class="font-body text-sm text-on-surface-variant tracking-wide">Precision Data</p>
</div>
<div class="bg-surface-container-low rounded-xl p-8 md:p-10 relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-surface-bright/5 to-transparent pointer-events-none"></div>
<h2 class="font-headline text-2xl font-bold text-on-surface mb-8">Create Account</h2>
<form id="signupForm" action="#" class="space-y-6 relative z-10" method="POST">
<div class="space-y-1">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="username">Username</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">person</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-highest border-0 outline-variant/15 text-on-surface rounded-lg placeholder:text-outline focus:ring-1 focus:ring-primary focus:outline-variant/100 transition-all duration-200 font-body text-sm" id="username" name="username" placeholder="Enter your username" required="" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">mail</span>
</span>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-highest border-0 outline-variant/15 text-on-surface rounded-lg placeholder:text-outline focus:ring-1 focus:ring-primary focus:outline-variant/100 transition-all duration-200 font-body text-sm" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</span>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-highest border-0 outline-variant/15 text-on-surface rounded-lg placeholder:text-outline focus:ring-1 focus:ring-primary focus:outline-variant/100 transition-all duration-200 font-body text-sm" id="password" minlength="8" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<p class="text-xs text-on-surface-variant mt-2 font-body">Must be at least 8 characters.</p>
</div>
<div class="pt-4">
<button class="w-full flex justify-center py-3.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-on-secondary bg-gradient-to-r from-secondary to-secondary-container hover:from-secondary-fixed-dim hover:to-secondary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-surface focus:ring-secondary transition-all duration-300" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="mt-8 text-center relative z-10">
<p class="font-body text-sm text-on-surface-variant">
                    Already have an account? 
                    <a class="font-medium text-primary hover:text-primary-fixed transition-colors ml-1" href="/pages/auth.html">Sign In</a>
</p>
</div>
</div>
<div class="mt-8 text-center">
<p class="font-body text-xs text-outline">Secure connection. Protected by advanced encryption.</p>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>

<script>
document.addEventListener("DOMContentLoaded", initSignup);
</script>
</main>
</body></html>
