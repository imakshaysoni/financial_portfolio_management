<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Update Password | LedgerPrecision</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- shared config -->
<script src="../assets/shared/tailwind.js"></script>

<style>
        body {
            background-color: #0b1326;
            color: #dae2fd;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(49, 57, 77, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="font-body selection:bg-primary/30">
<!-- Sidebar -->
  <div id="sidebar"></div>
<div class="flex-1 flex flex-col lg:ml-72">
    <!-- Header -->
    <div id="header"></div>
<div class="flex pt-16 screen">
<!-- SideNavBar -->

<!-- Main Content Area -->
<main class="flex-1 lg:ml-64 p-6 md:p-12 flex flex-col items-center justify-center">
<div class="w-full max-w-2xl">
<!-- Header Section -->
<div class="mb-10 text-center">
<span class="inline-block px-3 py-1 mb-4 rounded-full bg-secondary/10 text-secondary text-[10px] font-['Inter'] uppercase tracking-widest font-semibold border border-secondary/20">
                        Security Layer
                    </span>
<h1 class="text-4xl md:text-5xl font-['Plus_Jakarta_Sans'] font-extrabold text-on-surface tracking-tight mb-3">Update Password</h1>
<p class="text-on-surface-variant max-w-md mx-auto text-sm">Enhance your account security by choosing a robust, unique password for your Precision Monolith profile.</p>
</div>
<!-- Update Form Card -->
<div class="bg-surface-container-low rounded-xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Subtle Glow -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-primary/5 blur-[100px] rounded-full"></div>
<form class="space-y-8 relative z-10">
<!-- Current Password -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-['Inter'] uppercase tracking-widest text-[10px] font-bold text-on-surface-variant">Current Password</label>
<a class="text-[10px] text-primary hover:text-secondary transition-colors font-semibold" href="#">Forgot?</a>
</div>
<div class="relative group">
<input id="currentPassword" class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary rounded-md px-4 py-4 text-on-surface placeholder:text-outline-variant transition-all duration-300" placeholder="••••••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- New Password -->
<div class="space-y-4">
<div class="space-y-2">
<label class="font-['Inter'] uppercase tracking-widest text-[10px] font-bold text-on-surface-variant">New Password</label>
<div class="relative group">
<input  id="newPassword" class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary rounded-md px-4 py-4 text-on-surface placeholder:text-outline-variant transition-all duration-300" placeholder="Create a strong password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Validation Bento Grid -->
<div class="grid grid-cols-2 gap-3">
<div class="bg-surface-container-high/50 p-3 rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[10px] text-on-surface-variant font-medium">8+ characters</span>
</div>
<div class="bg-surface-container-high/50 p-3 rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-outline text-sm">circle</span>
<span class="text-[10px] text-on-surface-variant font-medium">Special symbol</span>
</div>
<div class="bg-surface-container-high/50 p-3 rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="text-[10px] text-on-surface-variant font-medium">One uppercase</span>
</div>
<div class="bg-surface-container-high/50 p-3 rounded-lg flex items-center gap-3">
<span class="material-symbols-outlined text-outline text-sm">circle</span>
<span class="text-[10px] text-on-surface-variant font-medium">One number</span>
</div>
</div>
</div>
<!-- Confirm New Password -->
<div class="space-y-2">
<label class="font-['Inter'] uppercase tracking-widest text-[10px] font-bold text-on-surface-variant">Confirm New Password</label>
<div class="relative group">
<input  id="confirmPassword"  class="w-full bg-surface-container-highest border-none focus:ring-1 focus:ring-primary rounded-md px-4 py-4 text-on-surface placeholder:text-outline-variant transition-all duration-300" placeholder="Repeat new password" type="password"/>
<button type="button" onclick="togglePassword(this)" class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-6 flex flex-col md:flex-row gap-4 items-center">
<button onclick="handleUpdatePassword()" type="button" class="w-full md:flex-1 bg-gradient-to-r from-secondary to-secondary-container text-on-secondary-container font-['Plus_Jakarta_Sans'] font-bold py-4 rounded-lg shadow-lg shadow-secondary/10 hover:shadow-secondary/20 transition-all duration-300 active:scale-[0.98]">
                                Update Password
                            </button>
<a class="w-full md:w-auto text-center px-8 py-4 text-on-surface-variant font-['Inter'] uppercase tracking-widest text-[10px] font-bold hover:text-on-surface transition-colors" href="/pages/profile_summary.html">
                                Cancel
                            </a>
</div>
</form>
</div>
<!-- Footer Context -->
<div class="mt-8 flex items-center justify-between px-2">
<div class="flex items-center gap-2">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-secondary"></span>
</span>
<span class="text-[10px] text-on-surface-variant uppercase tracking-widest">System Secure</span>
</div>
<div class="text-[10px] text-on-surface-variant font-medium italic">
                        Last changed 42 days ago
                    </div>
</div>
</div>
</main>
</div>
</div>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[10%] right-[5%] w-[400px] h-[400px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[5%] left-[5%] w-[300px] h-[300px] bg-secondary/5 rounded-full blur-[100px]"></div>
</div>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/utils.js"></script>
<script src="../assets/js/auth.js"></script>

<script src="../assets/js/positions.js"></script>
<script src="../assets/js/summary.js"></script>
<script src="../assets/js/dashboard.js"></script>
<script src="../assets/js/trade.js"></script>
<script src="../assets/js/layout.js"></script>
<script src="../assets/js/profile.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    if (!localStorage.getItem("access_token")) {
        window.location.href = "/pages/auth.html";
    }
    initLayout()
});
</script>
    <div id="toast-container"
     class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-3">
</div>
          <script src="../assets/js/toast.js"></script>


</body></html>
