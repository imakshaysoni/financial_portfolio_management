<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password - Equinox Ledger</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<!-- shared config -->
<script src="../assets/shared/tailwind.js"></script>

<!-- global css -->
<link rel="stylesheet" href="../assets/css/global.css">
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Canvas (No Nav/Footer due to transactional intent) -->
<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
<!-- Subtle Ambient Background Glow -->
<div class="absolute inset-0 z-0 pointer-events-none flex items-center justify-center">
<div class="w-[800px] h-[800px] bg-primary-fixed-dim/5 rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-md z-10">
<!-- Brand Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="w-12 h-12 bg-surface-container-high rounded-xl flex items-center justify-center shadow-[0_8px_32px_rgba(6,14,32,0.4)] mb-4 border border-outline-variant/15">
<span class="material-symbols-outlined text-primary text-2xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<h1 class="font-headline text-2xl font-extrabold tracking-tight text-on-surface">Equinox Ledger</h1>
</div>
<!-- Auth Card (Precision Monolith Style) -->
<div class="bg-surface-container-low rounded-xl p-8 shadow-[0_24px_60px_rgba(6,14,32,0.6)] relative border border-outline-variant/10">
<!-- Glassmorphism overlay hint -->
<div class="absolute inset-0 rounded-xl bg-surface-bright/5 backdrop-blur-[2px] pointer-events-none"></div>
<div class="relative z-10">
<h2 class="font-headline text-3xl font-bold mb-3 tracking-tight">Reset Password</h2>
<p class="text-on-surface-variant font-body text-sm mb-8 leading-relaxed">
                        Enter your email address and we'll send you a link to reset your password.
                    </p>
<form class="space-y-6" id="resetPasswordForm">
<!-- Email Input Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full bg-surface-container-highest border border-outline-variant/30 rounded-lg py-3 pl-11 pr-4 text-on-surface font-body text-sm placeholder:text-outline focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all shadow-inner" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Submit Button (Jeweled CTA) -->
<button class="w-full bg-gradient-to-r from-secondary to-secondary-container hover:from-secondary-fixed hover:to-secondary text-on-secondary font-headline font-bold py-3.5 px-6 rounded-lg transition-all duration-300 shadow-[0_8px_20px_rgba(78,222,163,0.15)] hover:shadow-[0_12px_24px_rgba(78,222,163,0.25)] flex justify-center items-center gap-2 group" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Back to Login Link -->
<div class="mt-8 text-center">
<a href="/pages/auth.html"
   class="inline-flex items-center gap-2 font-label text-sm text-primary hover:text-primary-fixed transition-colors">
   <span class="material-symbols-outlined text-sm">arrow_back</span>
   Back to Login
</a>
</div>
</div>
</div>
<!-- Success Message (Hidden by default, shown via JS) -->
<div class="hidden mt-6 bg-surface-container-high border border-secondary/20 rounded-lg p-4 flex items-start gap-3" id="successMessage">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div>
<h3 class="font-headline text-sm font-bold text-on-surface mb-1">Check your inbox</h3>
<p class="font-body text-xs text-on-surface-variant">We've sent a password reset link to your email address.</p>
</div>
</div>
</div>
</main>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>

<script src="../assets/js/toast.js"></script>
<script>
document.addEventListener("DOMContentLoaded", initResetPassword);
</script>

    <div id="toast-container"
     class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-3">
</div>
          <script src="../assets/js/toast.js"></script>

</body></html>
